min_particles: 500
max_particles: 2000
kld_err: 0.02
kld_z: 0.99
laser_max_range: 20.0
laser_min_range: 0.1
laser_model_type: likelihood_field
update_min_d: 0.05
update_min_a: 0.05
resample_interval: 1
transform_tolerance: 0.5

# Sensor-Modell Tuning
z_hit: 0.9
z_rand: 0.05
sigma_hit: 0.2

# Motion-Modell (Quadruped kann omnidirektional)
odom_model_type: omni
odom_alpha1: 0.2
odom_alpha2: 0.2
odom_alpha3: 0.2
odom_alpha4: 0.2
odom_alpha5: 0.1
