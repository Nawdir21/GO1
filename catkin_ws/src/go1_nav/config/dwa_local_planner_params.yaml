DWAPlannerROS:
  # kinematische Limits (an deine Gänge/Indoor anpassen)
  max_vel_x: 0.6
  min_vel_x: 0.0
  max_vel_y: 0.25
  min_vel_y: -0.25
  max_vel_trans: 0.8
  max_vel_theta: 0.8
  acc_lim_x: 1.5
  acc_lim_y: 1.5
  acc_lim_theta: 2.0

  # Zieltoleranzen
  yaw_goal_tolerance: 0.15
  xy_goal_tolerance: 0.15
  latch_xy_goal_tolerance: false

  # Sampling & Vorwärtssimulation
  sim_time: 2.0
  vx_samples: 20
  vy_samples: 10
  vtheta_samples: 20

  # Kosten-Gewichte
  path_distance_bias: 32.0
  goal_distance_bias: 24.0
  occdist_scale: 0.02
  forward_point_distance: 0.325
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2
